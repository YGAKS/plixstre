<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{font-family: 'Roboto', sans-serif;user-select:none;padding-top:80px;background-attachment:fixed;background-image:url('img/plix.svg');background-repeat:repeat;background-size:60px 60px;background-color:#EBEBEB;display:flex;flex-direction:column;min-height:100vh}.notification-bar{position:fixed;top:45px;left:0;right:0;background-color:rgba(255, 140, 0, 0.9);color:#fff;padding:5px 10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 5px rgba(0,0,0,.1);z-index:1001}.notification-bar p{margin:0;font-size:10px}.notification-bar button{background:none;border:none;color:#fff;font-weight:bold;font-size:16px;}navbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:space-between;padding:1px 10px;color:#333;margin-bottom:5px;background-color:#fff;box-shadow:0 5px 5px rgb(0 0 0/.1)}.title-left{display:flex;align-items:center}.title-left h1{font-size:20px;font-weight:700}.title-right{display:flex;align-items:center}.title-right p{margin-left:10px;font-size:15px;color:#666;font-family:'Poppins',sans-serif}img{cursor:none;}.no-right-click{-webkit-user-drag:none;user-drag:none}
  </style>
</head>
<body>
  <div class="notification-bar" id="notificationBar"><p id="notificationText">HALAMAN 404.</p><button onclick="closeNotification()">×</button></div><navbar><div class="title-left"><h1 translate="no">PLIXSTORE</h1></div><div class="title-right"><p id="changing-text">Nungguin apa? Pesan lah!</p></div></navbar>
  <script>const texts=["Nungguin apa? Pesan lah!","Mau builder? Pake nanya!","Mau desain? Cobain dulu!","Mau setup? Setupin sinih!", "Klik gambar untuk Melihat!"];let index=0;const textElement=document.getElementById('changing-text');setInterval(()=>{textElement.textContent=texts[index];index=(index+1)%texts.length},2000);</script><script>document.querySelectorAll('.material-icons').forEach((el) => {
  el.setAttribute('translate', 'no');
});document.addEventListener("DOMContentLoaded",function(){openTab('builder');});let mybutton=document.getElementById("backToTopBtn");window.onscroll=function(){if(document.body.scrollTop>20||document.documentElement.scrollTop>20){mybutton.classList.add("show")}else{mybutton.classList.remove("show")}};mybutton.onclick=function(){window.scrollTo({top:0,behavior:"smooth"})};window.onload=function(){const e=localStorage.getItem('scrollPos');e&&window.scrollTo(0,e)};window.onbeforeunload=function(){localStorage.setItem('scrollPos',window.scrollY)};const notifications=["HALAMAN 404"];let notifIndex=0;setInterval(()=>{document.getElementById('notificationText').textContent=notifications[notifIndex=(notifIndex+1)%notifications.length]},5000);function closeNotification(){document.getElementById('notificationBar').style.display='none'}document.querySelectorAll("img").forEach(e=>e.addEventListener("contextmenu",t=>t.preventDefault()));</script>
</body>
</html>
